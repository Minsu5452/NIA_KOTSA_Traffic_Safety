# 운수종사자 인지 특성 데이터 기반 교통사고 위험 예측 — 학습/추론 기본 설정
data:
  data_dir: data
  train_meta: train.csv
  test_meta: test.csv
  sample_submission: sample_submission.csv
  train_subdir: train
  test_subdir: test

split:
  n_splits: 5
  shuffle: true
  random_state: 42
  stratify_column: Label
  group_column: PrimaryKey   # 동일 운수종사자가 train/valid 양쪽에 노출되지 않도록 그룹 KFold 사용

models:
  lightgbm:
    objective: binary
    metric: auc
    learning_rate: 0.03
    num_leaves: 63
    max_depth: -1
    min_child_samples: 32
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    reg_alpha: 1.0
    reg_lambda: 5.0
    n_estimators: 3000
    verbosity: -1
  catboost:
    loss_function: Logloss
    eval_metric: AUC
    learning_rate: 0.04
    depth: 7
    l2_leaf_reg: 6.0
    iterations: 4000
    od_type: Iter
    od_wait: 200
    bootstrap_type: Bernoulli
    subsample: 0.85
    verbose: 0

ensemble:
  weights:
    lightgbm: 0.55
    catboost: 0.45

output:
  model_dir: models
  submission_path: submissions/submission.csv
  oof_path: artifacts/oof.csv
  log_path: logs/run.log
